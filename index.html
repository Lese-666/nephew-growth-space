<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简历生成器 - Resume Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --bg-color: #F5F7FA;
            --sidebar-bg: #FFFFFF;
            --primary-color: #4A90D9;
            --primary-hover: #3A7BC8;
            --text-primary: #333333;
            --text-secondary: #666666;
            --border-color: #E0E4E8;
            --input-bg: #FFFFFF;
            --input-border: #D0D5DD;
            --shadow: rgba(0, 0, 0, 0.08);
            --resume-bg: #FFFFFF;
            --resume-text: #333333;
            --resume-secondary: #666666;
            --resume-border: #E8E8E8;
            --font-family: 'Noto Sans SC', sans-serif;
            --resume-font-family: 'Noto Sans SC', sans-serif;
            --font-size: 14px;
            --transition-speed: 0.3s;
        }

        [data-theme="dark"] {
            --bg-color: #1A1A2E;
            --sidebar-bg: #252538;
            --primary-color: #6C8EEF;
            --primary-hover: #5A7CDF;
            --text-primary: #E8E8E8;
            --text-secondary: #A0A0A0;
            --border-color: #3A3A4A;
            --input-bg: #2A2A3E;
            --input-border: #4A4A5E;
            --shadow: rgba(0, 0, 0, 0.3);
            --resume-bg: #2A2A3E;
            --resume-text: #E8E8E8;
            --resume-secondary: #B0B0B0;
            --resume-border: #3A3A4A;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-primary);
            transition: background-color var(--transition-speed), color var(--transition-speed);
            min-height: 100vh;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 24px;
            background: var(--sidebar-bg);
            box-shadow: 0 2px 8px var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary-color);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .btn-secondary {
            background: var(--input-bg);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            border-color: var(--primary-color);
        }

        .theme-toggle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid var(--border-color);
            background: var(--input-bg);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.2s;
        }

        .theme-toggle:hover {
            border-color: var(--primary-color);
        }

        .main-container {
            display: flex;
            height: calc(100vh - 65px);
        }

        .input-panel {
            width: 40%;
            min-width: 380px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            overflow-y: auto;
            padding: 20px;
        }

        .preview-panel {
            flex: 1;
            background: var(--bg-color);
            overflow-y: auto;
            padding: 30px;
            display: flex;
            justify-content: center;
        }

        .section {
            margin-bottom: 24px;
            background: var(--sidebar-bg);
            border-radius: 10px;
            padding: 16px;
            box-shadow: 0 2px 8px var(--shadow);
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--primary-color);
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--primary-color);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 6px;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--input-border);
            border-radius: 6px;
            font-size: 14px;
            background: var(--input-bg);
            color: var(--text-primary);
            transition: border-color 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .form-textarea {
            min-height: 80px;
            resize: vertical;
        }

        .photo-upload {
            border: 2px dashed var(--border-color);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .photo-upload:hover {
            border-color: var(--primary-color);
            background: rgba(74, 144, 217, 0.05);
        }

        .photo-upload.has-photo {
            padding: 10px;
        }

        .photo-upload input {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            opacity: 0;
            cursor: pointer;
        }

        .photo-preview {
            width: 100px;
            height: 130px;
            object-fit: cover;
            border-radius: 4px;
            margin: 0 auto;
            display: block;
        }

        .photo-placeholder {
            color: var(--text-secondary);
            font-size: 13px;
        }

        .photo-placeholder-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .entry-item {
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
            position: relative;
        }

        .entry-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .entry-title {
            font-weight: 500;
            font-size: 14px;
        }

        .btn-delete {
            background: #FF6B6B;
            color: white;
            border: none;
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .btn-delete:hover {
            background: #FF5252;
        }

        .btn-add {
            width: 100%;
            padding: 10px;
            border: 1px dashed var(--border-color);
            border-radius: 6px;
            background: transparent;
            color: var(--primary-color);
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .btn-add:hover {
            border-color: var(--primary-color);
            background: rgba(74, 144, 217, 0.05);
        }

        .skills-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .skill-tag {
            background: var(--primary-color);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }

        .theme-selector {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .theme-option {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            gap: 4px;
        }

        .theme-option:hover {
            transform: scale(1.05);
        }

        .theme-option.active {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(74, 144, 217, 0.3);
        }

        .theme-color {
            width: 30px;
            height: 30px;
            border-radius: 50%;
        }

        .customizer {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 12px;
        }

        .customizer-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .customizer-label {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .color-picker {
            width: 100%;
            height: 36px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            padding: 2px;
        }

        .font-select {
            width: 100%;
            padding: 8px;
            border: 1px solid var(--input-border);
            border-radius: 6px;
            background: var(--input-bg);
            color: var(--text-primary);
            font-size: 13px;
        }

        .font-size-control {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .font-size-slider {
            flex: 1;
            height: 6px;
            border-radius: 3px;
            background: var(--border-color);
            -webkit-appearance: none;
            appearance: none;
        }

        .font-size-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--primary-color);
            cursor: pointer;
        }

        .font-size-value {
            font-size: 12px;
            color: var(--text-secondary);
            min-width: 35px;
        }

        .resume-paper {
            width: 595px;
            min-height: 842px;
            background: var(--resume-bg);
            box-shadow: 0 4px 20px var(--shadow);
            padding: 40px;
            color: var(--resume-text);
            transition: all var(--transition-speed);
        }

        .resume-header {
            display: flex;
            gap: 20px;
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--primary-color);
        }

        .resume-photo {
            width: 100px;
            height: 130px;
            object-fit: cover;
            border-radius: 4px;
            border: 1px solid var(--resume-border);
        }

        .resume-photo-placeholder {
            width: 100px;
            height: 130px;
            background: var(--resume-border);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            color: var(--resume-secondary);
        }

        .resume-info {
            flex: 1;
        }

        .resume-name {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--primary-color);
        }

        .resume-objective {
            font-size: 14px;
            color: var(--resume-secondary);
            margin-bottom: 12px;
        }

        .resume-contact {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            font-size: 13px;
            color: var(--resume-secondary);
        }

        .resume-contact-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .resume-section {
            margin-bottom: 20px;
        }

        .resume-section-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--primary-color);
            margin-bottom: 12px;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--resume-border);
        }

        .resume-item {
            margin-bottom: 12px;
        }

        .resume-item-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 4px;
        }

        .resume-item-title {
            font-weight: 600;
            font-size: 14px;
        }

        .resume-item-date {
            font-size: 12px;
            color: var(--resume-secondary);
        }

        .resume-item-subtitle {
            font-size: 13px;
            color: var(--resume-secondary);
            margin-bottom: 4px;
        }

        .resume-item-desc {
            font-size: 13px;
            line-height: 1.6;
            color: var(--resume-text);
        }

        .resume-skills {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .resume-skill {
            background: var(--primary-color);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }

        .resume-summary {
            font-size: 13px;
            line-height: 1.8;
            color: var(--resume-text);
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 1024px) {
            .main-container {
                flex-direction: column;
                height: auto;
            }

            .input-panel {
                width: 100%;
                min-width: unset;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
            }

            .preview-panel {
                padding: 20px;
            }

            .resume-paper {
                width: 100%;
                max-width: 595px;
                min-height: auto;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">
            <span>📄</span>
            <span>简历生成器</span>
        </div>
        <div class="header-actions">
            <button class="btn btn-secondary" onclick="openCustomizer()">
                🎨 自定义
            </button>
            <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">
                <span id="themeIcon">🌙</span>
            </button>
            <button class="btn btn-primary" onclick="exportPDF()">
                📥 导出PDF
            </button>
            <button class="btn btn-primary" onclick="exportImage()">
                🖼️ 导出图片
            </button>
        </div>
    </header>

    <div class="main-container">
        <aside class="input-panel">
            <div class="section">
                <div class="section-title">📋 基本信息</div>
                <div class="form-group">
                    <label class="form-label">姓名</label>
                    <input type="text" class="form-input" id="name" placeholder="请输入姓名" oninput="updatePreview()">
                </div>
                <div class="form-group">
                    <label class="form-label">求职意向</label>
                    <input type="text" class="form-input" id="objective" placeholder="请输入求职意向" oninput="updatePreview()">
                </div>
                <div class="form-group">
                    <label class="form-label">电话</label>
                    <input type="tel" class="form-input" id="phone" placeholder="请输入电话号码" oninput="updatePreview()">
                </div>
                <div class="form-group">
                    <label class="form-label">邮箱</label>
                    <input type="email" class="form-input" id="email" placeholder="请输入邮箱" oninput="updatePreview()">
                </div>
                <div class="form-group">
                    <label class="form-label">地址</label>
                    <input type="text" class="form-input" id="address" placeholder="请输入地址" oninput="updatePreview()">
                </div>
                <div class="form-group">
                    <label class="form-label">证件照 (支持拖拽上传)</label>
                    <div class="photo-upload" id="photoUpload">
                        <input type="file" accept="image/*" id="photoInput" onchange="handlePhotoUpload(event)">
                        <div class="photo-placeholder" id="photoPlaceholder">
                            <div class="photo-placeholder-icon">📷</div>
                            <div>点击或拖拽上传照片</div>
                            <div style="font-size:11px;margin-top:4px;">支持 JPG, PNG, WEBP (最大2MB)</div>
                        </div>
                        <img src="" alt="证件照" class="photo-preview hidden" id="photoPreview">
                    </div>
                </div>
            </div>

            <div class="section">
                <div class="section-title">🎓 学历信息</div>
                <div id="educationList"></div>
                <button class="btn-add" onclick="addEducation()">+ 添加学历</button>
            </div>

            <div class="section">
                <div class="section-title">💼 项目实践</div>
                <div id="projectList"></div>
                <button class="btn-add" onclick="addProject()">+ 添加项目</button>
            </div>

            <div class="section">
                <div class="section-title">⭐ 擅长技能</div>
                <div class="form-group">
                    <label class="form-label">技能 (用逗号分隔)</label>
                    <input type="text" class="form-input" id="skills" placeholder="例如: JavaScript, Python, React" oninput="updatePreview()">
                </div>
            </div>

            <div class="section">
                <div class="section-title">💬 自我评价</div>
                <div class="form-group">
                    <textarea class="form-input form-textarea" id="summary" placeholder="请输入自我评价..." oninput="updatePreview()"></textarea>
                </div>
            </div>
        </aside>

        <main class="preview-panel">
            <div class="resume-paper" id="resumePaper">
                <div class="resume-header" id="resumeHeader">
                    <div class="resume-photo-placeholder" id="resumePhotoPlaceholder">📷</div>
                    <img src="" alt="证件照" class="resume-photo hidden" id="resumePhoto">
                    <div class="resume-info">
                        <div class="resume-name" id="resumeName">姓名</div>
                        <div class="resume-objective" id="resumeObjective"></div>
                        <div class="resume-contact" id="resumeContact"></div>
                    </div>
                </div>

                <div class="resume-section" id="educationSection">
                    <div class="resume-section-title">教育背景</div>
                    <div id="resumeEducation"></div>
                </div>

                <div class="resume-section" id="projectSection">
                    <div class="resume-section-title">项目实践</div>
                    <div id="resumeProjects"></div>
                </div>

                <div class="resume-section" id="skillsSection">
                    <div class="resume-section-title">擅长技能</div>
                    <div class="resume-skills" id="resumeSkills"></div>
                </div>

                <div class="resume-section" id="summarySection">
                    <div class="resume-section-title">自我评价</div>
                    <div class="resume-summary" id="resumeSummary"></div>
                </div>
            </div>
        </main>
    </div>

    <div class="section hidden" id="customizerPanel" style="position:fixed;top:70px;right:20px;width:320px;z-index:99;max-height:calc(100vh - 90px);overflow-y:auto;">
        <div class="section-title">🎨 主题与自定义</div>
        <div class="theme-selector">
            <div class="theme-option active" data-theme="classic" onclick="selectTheme('classic')">
                <div class="theme-color" style="background:#4A90D9;"></div>
                <span>经典专业</span>
            </div>
            <div class="theme-option" data-theme="minimal" onclick="selectTheme('minimal')">
                <div class="theme-color" style="background:#52C4A0;"></div>
                <span>简约清新</span>
            </div>
            <div class="theme-option" data-theme="business" onclick="selectTheme('business')">
                <div class="theme-color" style="background:#5A5A6E;"></div>
                <span>商务精英</span>
            </div>
        </div>
        <div class="customizer">
            <div class="customizer-item">
                <label class="customizer-label">主题颜色</label>
                <input type="color" class="color-picker" id="colorPicker" value="#4A90D9" onchange="applyCustomColor()">
            </div>
            <div class="customizer-item">
                <label class="customizer-label">字体</label>
                <select class="font-select" id="fontSelect" onchange="applyCustomFont()">
                    <option value="'Noto Sans SC', sans-serif">思源黑体</option>
                    <option value="'Noto Serif SC', serif">思源宋体</option>
                    <option value="Microsoft YaHei, sans-serif">微软雅黑</option>
                    <option value="SimSun, serif">宋体</option>
                </select>
            </div>
        </div>
        <div class="customizer-item" style="margin-top:12px;">
            <label class="customizer-label">字号大小</label>
            <div class="font-size-control">
                <span style="font-size:12px;">小</span>
                <input type="range" class="font-size-slider" id="fontSizeSlider" min="12" max="18" value="14" oninput="applyCustomFontSize()">
                <span style="font-size:12px;">大</span>
                <span class="font-size-value" id="fontSizeValue">14px</span>
            </div>
        </div>
    </div>

    <script>
        const { jsPDF } = window.jspdf;

        const themes = {
            classic: { primary: '#4A90D9', name: '经典专业' },
            minimal: { primary: '#52C4A0', name: '简约清新' },
            business: { primary: '#5A5A6E', name: '商务精英' }
        };

        let currentTheme = 'classic';
        let photoBase64 = '';
        let educations = [];
        let projects = [];

        function toggleTheme() {
            const body = document.body;
            const themeIcon = document.getElementById('themeIcon');
            if (body.hasAttribute('data-theme')) {
                body.removeAttribute('data-theme');
                themeIcon.textContent = '🌙';
                localStorage.setItem('theme', 'light');
            } else {
                body.setAttribute('data-theme', 'dark');
                themeIcon.textContent = '☀️';
                localStorage.setItem('theme', 'dark');
            }
            updatePreview();
        }

        function loadThemePreference() {
            const savedTheme = localStorage.getItem('theme');
            const themeIcon = document.getElementById('themeIcon');
            if (savedTheme === 'dark') {
                document.body.setAttribute('data-theme', 'dark');
                themeIcon.textContent = '☀️';
            }
        }

        function openCustomizer() {
            const panel = document.getElementById('customizerPanel');
            panel.classList.toggle('hidden');
        }

        function selectTheme(themeName) {
            currentTheme = themeName;
            document.querySelectorAll('.theme-option').forEach(opt => {
                opt.classList.toggle('active', opt.dataset.theme === themeName);
            });
            applyCustomColor();
        }

        function applyCustomColor() {
            const colorPicker = document.getElementById('colorPicker');
            let color = colorPicker.value;
            if (!color.startsWith('#')) {
                color = '#' + color;
            }
            document.documentElement.style.setProperty('--primary-color', color);
            const themeOptions = document.querySelectorAll('.theme-option');
            themeOptions.forEach(opt => {
                if (opt.classList.contains('active')) {
                    const themeColor = getComputedStyle(opt.querySelector('.theme-color')).backgroundColor;
                }
            });
            updatePreview();
        }

        function applyCustomFont() {
            const fontSelect = document.getElementById('fontSelect');
            const fontFamily = fontSelect.value;
            document.documentElement.style.setProperty('--resume-font-family', fontFamily);
            updatePreview();
        }

        function applyCustomFontSize() {
            const slider = document.getElementById('fontSizeSlider');
            const value = slider.value;
            document.getElementById('fontSizeValue').textContent = value + 'px';
            document.documentElement.style.setProperty('--font-size', value + 'px');
            updatePreview();
        }

        function handlePhotoUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            if (file.size > 2 * 1024 * 1024) {
                alert('图片大小不能超过 2MB');
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                photoBase64 = e.target.result;
                document.getElementById('photoPlaceholder').classList.add('hidden');
                document.getElementById('photoPreview').src = photoBase64;
                document.getElementById('photoPreview').classList.remove('hidden');
                document.getElementById('photoUpload').classList.add('has-photo');

                document.getElementById('resumePhotoPlaceholder').classList.add('hidden');
                document.getElementById('resumePhoto').src = photoBase64;
                document.getElementById('resumePhoto').classList.remove('hidden');
                document.getElementById('resumeHeader').style.display = 'flex';
            };
            reader.readAsDataURL(file);
        }

        function addEducation() {
            const id = Date.now();
            educations.push({ id, school: '', degree: '', major: '', startDate: '', endDate: '' });
            renderEducationList();
        }

        function removeEducation(id) {
            educations = educations.filter(e => e.id !== id);
            renderEducationList();
            updatePreview();
        }

        function renderEducationList() {
            const container = document.getElementById('educationList');
            container.innerHTML = educations.map((edu, index) => `
                <div class="entry-item" data-id="${edu.id}">
                    <div class="entry-header">
                        <span class="entry-title">学历 ${index + 1}</span>
                        <button class="btn-delete" onclick="removeEducation(${edu.id})">删除</button>
                    </div>
                    <div class="form-group">
                        <label class="form-label">学校名称</label>
                        <input type="text" class="form-input" placeholder="请输入学校名称" value="${edu.school}" oninput="updateEducation(${edu.id}, 'school', this.value)">
                    </div>
                    <div class="form-group">
                        <label class="form-label">学历</label>
                        <select class="form-input" onchange="updateEducation(${edu.id}, 'degree', this.value)">
                            <option value="">请选择</option>
                            <option value="高中" ${edu.degree === '高中' ? 'selected' : ''}>高中</option>
                            <option value="大专" ${edu.degree === '大专' ? 'selected' : ''}>大专</option>
                            <option value="本科" ${edu.degree === '本科' ? 'selected' : ''}>本科</option>
                            <option value="硕士" ${edu.degree === '硕士' ? 'selected' : ''}>硕士</option>
                            <option value="博士" ${edu.degree === '博士' ? 'selected' : ''}>博士</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">专业</label>
                        <input type="text" class="form-input" placeholder="请输入专业" value="${edu.major}" oninput="updateEducation(${edu.id}, 'major', this.value)">
                    </div>
                    <div style="display:flex;gap:10px;">
                        <div class="form-group" style="flex:1;">
                            <label class="form-label">开始时间</label>
                            <input type="text" class="form-input" placeholder="如: 2019.09" value="${edu.startDate}" oninput="updateEducation(${edu.id}, 'startDate', this.value)">
                        </div>
                        <div class="form-group" style="flex:1;">
                            <label class="form-label">结束时间</label>
                            <input type="text" class="form-input" placeholder="如: 2023.06" value="${edu.endDate}" oninput="updateEducation(${edu.id}, 'endDate', this.value)">
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function updateEducation(id, field, value) {
            const edu = educations.find(e => e.id === id);
            if (edu) {
                edu[field] = value;
                updatePreview();
            }
        }

        function addProject() {
            const id = Date.now();
            projects.push({ id, name: '', date: '', description: '' });
            renderProjectList();
        }

        function removeProject(id) {
            projects = projects.filter(p => p.id !== id);
            renderProjectList();
            updatePreview();
        }

        function renderProjectList() {
            const container = document.getElementById('projectList');
            container.innerHTML = projects.map((proj, index) => `
                <div class="entry-item" data-id="${proj.id}">
                    <div class="entry-header">
                        <span class="entry-title">项目 ${index + 1}</span>
                        <button class="btn-delete" onclick="removeProject(${proj.id})">删除</button>
                    </div>
                    <div class="form-group">
                        <label class="form-label">项目名称</label>
                        <input type="text" class="form-input" placeholder="请输入项目名称" value="${proj.name}" oninput="updateProject(${proj.id}, 'name', this.value)">
                    </div>
                    <div class="form-group">
                        <label class="form-label">项目时间</label>
                        <input type="text" class="form-input" placeholder="如: 2022.06 - 2022.12" value="${proj.date}" oninput="updateProject(${proj.id}, 'date', this.value)">
                    </div>
                    <div class="form-group">
                        <label class="form-label">项目描述</label>
                        <textarea class="form-input form-textarea" placeholder="请描述项目内容及您的职责..." oninput="updateProject(${proj.id}, 'description', this.value)">${proj.description}</textarea>
                    </div>
                </div>
            `).join('');
        }

        function updateProject(id, field, value) {
            const proj = projects.find(p => p.id === id);
            if (proj) {
                proj[field] = value;
                updatePreview();
            }
        }

        let debounceTimer;
        function updatePreview() {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                renderPreview();
            }, 100);
        }

        function renderPreview() {
            const name = document.getElementById('name').value || '姓名';
            const objective = document.getElementById('objective').value;
            const phone = document.getElementById('phone').value;
            const email = document.getElementById('email').value;
            const address = document.getElementById('address').value;
            const skills = document.getElementById('skills').value;
            const summary = document.getElementById('summary').value;

            document.getElementById('resumeName').textContent = name;

            const resumeObjective = document.getElementById('resumeObjective');
            resumeObjective.textContent = objective || '';
            resumeObjective.style.display = objective ? 'block' : 'none';

            const contactParts = [];
            if (phone) contactParts.push(`📞 ${phone}`);
            if (email) contactParts.push(`✉️ ${email}`);
            if (address) contactParts.push(`📍 ${address}`);

            const resumeContact = document.getElementById('resumeContact');
            resumeContact.innerHTML = contactParts.map(c => `<span class="resume-contact-item">${c}</span>`).join('');
            resumeContact.style.display = contactParts.length > 0 ? 'flex' : 'none';

            const hasBasicInfo = name || objective || phone || email || address || photoBase64;
            document.getElementById('resumeHeader').style.display = hasBasicInfo ? 'flex' : 'none';

            if (photoBase64) {
                document.getElementById('resumePhotoPlaceholder').classList.add('hidden');
                document.getElementById('resumePhoto').src = photoBase64;
                document.getElementById('resumePhoto').classList.remove('hidden');
            } else {
                document.getElementById('resumePhotoPlaceholder').classList.remove('hidden');
                document.getElementById('resumePhoto').classList.add('hidden');
            }

            const validEducations = educations.filter(e => e.school || e.degree || e.major);
            const resumeEducation = document.getElementById('resumeEducation');
            if (validEducations.length > 0) {
                resumeEducation.innerHTML = validEducations.map(edu => `
                    <div class="resume-item">
                        <div class="resume-item-header">
                            <span class="resume-item-title">${edu.school || ''}</span>
                            <span class="resume-item-date">${[edu.startDate, edu.endDate].filter(d => d).join(' - ')}</span>
                        </div>
                        <div class="resume-item-subtitle">${[edu.degree, edu.major].filter(d => d).join(' · ')}</div>
                    </div>
                `).join('');
                document.getElementById('educationSection').style.display = 'block';
            } else {
                document.getElementById('educationSection').style.display = 'none';
            }

            const validProjects = projects.filter(p => p.name || p.description);
            const resumeProjects = document.getElementById('resumeProjects');
            if (validProjects.length > 0) {
                resumeProjects.innerHTML = validProjects.map(proj => `
                    <div class="resume-item">
                        <div class="resume-item-header">
                            <span class="resume-item-title">${proj.name || ''}</span>
                            <span class="resume-item-date">${proj.date || ''}</span>
                        </div>
                        <div class="resume-item-desc">${proj.description || ''}</div>
                    </div>
                `).join('');
                document.getElementById('projectSection').style.display = 'block';
            } else {
                document.getElementById('projectSection').style.display = 'none';
            }

            const resumeSkills = document.getElementById('resumeSkills');
            if (skills) {
                const skillList = skills.split(',').map(s => s.trim()).filter(s => s);
                resumeSkills.innerHTML = skillList.map(s => `<span class="resume-skill">${s}</span>`).join('');
                document.getElementById('skillsSection').style.display = 'block';
            } else {
                document.getElementById('skillsSection').style.display = 'none';
            }

            const resumeSummary = document.getElementById('resumeSummary');
            if (summary) {
                resumeSummary.textContent = summary;
                document.getElementById('summarySection').style.display = 'block';
            } else {
                document.getElementById('summarySection').style.display = 'none';
            }
        }

        async function exportPDF() {
            const btn = event.target.closest('button');
            btn.disabled = true;
            btn.textContent = '导出中...';

            try {
                const paper = document.getElementById('resumePaper');
                const canvas = await html2canvas(paper, {
                    scale: 2,
                    useCORS: true,
                    backgroundColor: getComputedStyle(paper).backgroundColor
                });

                const imgData = canvas.toDataURL('image/png');
                const pdf = new jsPDF({
                    orientation: 'portrait',
                    unit: 'px',
                    format: [595, 842]
                });

                pdf.addImage(imgData, 'PNG', 0, 0, 595, 842);
                pdf.save('简历.pdf');
            } catch (error) {
                console.error('Export PDF error:', error);
                alert('导出失败，请重试');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '📥 导出PDF';
            }
        }

        async function exportImage() {
            const btn = event.target.closest('button');
            btn.disabled = true;
            btn.textContent = '导出中...';

            try {
                const paper = document.getElementById('resumePaper');
                const canvas = await html2canvas(paper, {
                    scale: 2,
                    useCORS: true,
                    backgroundColor: getComputedStyle(paper).backgroundColor
                });

                const link = document.createElement('a');
                link.download = '简历.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            } catch (error) {
                console.error('Export image error:', error);
                alert('导出失败，请重试');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '🖼️ 导出图片';
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            loadThemePreference();
            renderPreview();

            const photoUpload = document.getElementById('photoUpload');
            photoUpload.addEventListener('dragover', function(e) {
                e.preventDefault();
                this.style.borderColor = 'var(--primary-color)';
                this.style.background = 'rgba(74, 144, 217, 0.05)';
            });
            photoUpload.addEventListener('dragleave', function(e) {
                e.preventDefault();
                this.style.borderColor = '';
                this.style.background = '';
            });
            photoUpload.addEventListener('drop', function(e) {
                e.preventDefault();
                this.style.borderColor = '';
                this.style.background = '';
                const file = e.dataTransfer.files[0];
                if (file && file.type.startsWith('image/')) {
                    const input = document.getElementById('photoInput');
                    const dt = new DataTransfer();
                    dt.items.add(file);
                    input.files = dt.files;
                    handlePhotoUpload({ target: input });
                }
            });

            document.addEventListener('click', function(e) {
                const customizer = document.getElementById('customizerPanel');
                const customizerBtn = e.target.closest('button[onclick="openCustomizer()"]');
                if (!customizer.contains(e.target) && !customizerBtn) {
                    customizer.classList.add('hidden');
                }
            });
        });
    </script>
</body>
</html>
